<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Admin Login — {{ site.name }}</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:system-ui,-apple-system,sans-serif;background:#f8f4ff;min-height:100vh;display:flex;align-items:center;justify-content:center}
:root{--pc:{{ site.primaryColor }};--ac:{{ site.accentColor }}}
.inp{width:100%;padding:10px 12px;border:1.5px solid #e8e0ff;border-radius:10px;font-size:16px;color:#1a1040;background:#fafafa;outline:none;text-align:center;letter-spacing:0.2em}
.inp:focus{border-color:var(--pc)}
.inp.err{border-color:#EF4444}
.lbl{display:block;font-weight:600;font-size:11px;color:#555;margin-bottom:5px;text-transform:uppercase;letter-spacing:0.05em}
@keyframes shake{0%,100%{transform:translateX(0)}20%,60%{transform:translateX(-8px)}40%,80%{transform:translateX(8px)}}
.shake{animation:shake 0.4s ease}
</style>
</head>
<body>
<div id="card" style="background:#fff;border-radius:24px;padding:44px 36px;width:340px;box-shadow:0 20px 60px rgba(108,62,232,0.18);border:1px solid #f0eeff">
  <div style="text-align:center;margin-bottom:28px">
    <div style="font-size:48px;margin-bottom:10px">🔐</div>
    <div style="font-weight:900;font-size:20px;color:#1a1040">Admin Access</div>
    <div style="color:#888;font-size:13px;margin-top:5px">Enter password to continue</div>
  </div>
  <form method="post" onsubmit="return checkShake()">
    <div style="margin-bottom:16px">
      <label class="lbl">Password</label>
      <input class="inp {{ 'err' if error }}" type="password" name="password" placeholder="••••••" autofocus/>
      {% if error %}<div style="color:#EF4444;font-size:12px;margin-top:6px;text-align:center;font-weight:600">❌ Wrong password. Try again.</div>{% endif %}
    </div>
    <button type="submit" style="width:100%;padding:13px;background:var(--pc);border:none;border-radius:12px;color:#fff;font-weight:800;font-size:15px;cursor:pointer;box-shadow:0 4px 16px rgba(108,62,232,0.3)">Unlock →</button>
  </form>
  <a href="/" style="display:block;text-align:center;margin-top:12px;padding:10px;background:#f5f5f5;border-radius:10px;color:#888;font-weight:600;font-size:13px">← Back to Store</a>
</div>
<script>
{% if error %}
document.getElementById('card').classList.add('shake');
setTimeout(()=>document.getElementById('card').classList.remove('shake'),500);
{% endif %}
</script>
</body>
</html>
